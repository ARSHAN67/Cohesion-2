<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Lyra Builders</title>
    <script src="chatbot.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Lyra Builders</h1>
    </header>
    <main>
        <section>
            <h2>Our Packages</h2>
            <ul>
                <li>Everything Package: ₹5,000</li>
                <li>Basic Website: $2,000</li>
                <li>Premium Website: ₹4,000</li>
                <li>AI Chatbot: ₹2,000</li>
            </ul>
        </section>
        <section>
            <h2>Contact Us</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" value="lyrabuilders22@gmail.com" required>
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" value="7658008604" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
        <section id="chatbot">
            <!-- AI Chatbot will be initialized here -->
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Lyra Builders. All rights reserved.</p>
    </footer>
</body>
</html>
